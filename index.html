<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐍 Snake - Proyecto con Sara</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div id="app">
      <!-- Pantalla de inicio -->
      <div id="screen-start" class="screen active">
        <h1 class="title">🐍 Snake</h1>
        <p class="subtitle">Proyecto con Sara</p>
        <div class="controls-info">
          <p>⬆ ⬇ ⬅ ➡ &nbsp; Mover la culebra</p>
          <p>P &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Pausar</p>
        </div>
        <button id="btn-start" class="btn btn-primary">Jugar</button>
      </div>

      <!-- Pantalla del juego -->
      <div id="screen-game" class="screen">
        <header class="game-header">
          <div class="stat">
            <span class="stat-label">Puntaje</span>
            <span id="display-score" class="stat-value">0</span>
          </div>
          <button id="btn-pause" class="btn btn-small">Pausa</button>
          <div class="stat">
            <span class="stat-label">Récord</span>
            <span id="display-best" class="stat-value">0</span>
          </div>
        </header>

        <canvas id="game-canvas"></canvas>

        <!-- Overlay de pausa -->
        <div id="overlay-pause" class="overlay hidden">
          <p>⏸ Pausado</p>
          <button id="btn-resume" class="btn btn-primary">Continuar</button>
        </div>
      </div>

      <!-- Pantalla de Game Over -->
      <div id="screen-gameover" class="screen">
        <h2 class="title">💀 Game Over</h2>
        <p class="result-label">Puntaje final</p>
        <p id="final-score" class="result-score">0</p>
        <p id="new-record" class="new-record hidden">🏆 ¡Nuevo récord!</p>
        <button id="btn-restart" class="btn btn-primary">Jugar de nuevo</button>
        <button id="btn-menu" class="btn btn-secondary">Menú</button>
      </div>
    </div>

    <!-- Módulos ES (un archivo por responsabilidad) -->
    <script type="module" src="src/game.js"></script>
  </body>
</html>
